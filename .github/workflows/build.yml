name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew copyVersionedDebugApk --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: remote-claude-debug
          path: android/app/build/outputs/apk/versioned/*-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew copyVersionedReleaseApk --no-daemon
        continue-on-error: true

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-claude-release-unsigned
          path: android/app/build/outputs/apk/versioned/*-release-unsigned.apk
          retention-days: 30
